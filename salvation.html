<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvation - Skaldsson</title>
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; color: #fff; font-family: "am-udine", sans-serif; font-weight: 400; overflow-x: hidden; animation: fadeIn 2s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 60px; padding: 100px 80px 150px 80px; max-width: 1600px; margin: 0 auto; }
        .gallery-item { display: flex; flex-direction: column; }
        .gallery-item img { width: 100%; height: auto; filter: grayscale(100%) contrast(1.2); transition: filter 0.5s ease, transform 0.4s ease; cursor: zoom-in; }
        .gallery-item:hover img { filter: grayscale(0%) contrast(1); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); opacity: 0; transition: opacity 0.3s ease; cursor: zoom-out; display: flex; justify-content: center; align-items: center; visibility: hidden; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { max-width: 95vw; max-height: 95vh; object-fit: contain; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .return-btn { position: fixed; bottom: 40px; left: 50px; color: #fff; text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; z-index: 100; transition: color 0.3s ease; }
        .return-btn:hover { color: #555; }
        @media (max-width: 768px) { .gallery-container { grid-template-columns: 1fr; padding: 60px 20px 120px 20px; gap: 40px; } .return-btn { bottom: 25px; left: 25px; font-size: 1rem; } }
    </style>
</head>
<body>

    <a href="vertical.html" class="return-btn">don't like it</a>

    <div id="image-modal" class="modal"><img class="modal-content" id="full-image"></div>

    <div class="gallery-container">
        <div class="gallery-item"><img src="Sunshine/A horse.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Approaching Storm.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/It Shines on You.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Lonely Christ in the Desert.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Lonely Church on a Hill.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Lonely Tower.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Spring Mountain.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Summer.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Sunset Church.jpg" alt="Salvation"></div>
        <div class="gallery-item"><img src="Sunshine/Windwing Road.jpg" alt="Salvation"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById("image-modal"), modalImg = document.getElementById("full-image");
            document.querySelectorAll(".gallery-item img").forEach(img => { img.addEventListener("click", () => { modalImg.src = img.src; modal.classList.add("show"); }); });
            modal.addEventListener("click", () => { modal.classList.remove("show"); setTimeout(() => { if (!modal.classList.contains("show")) modalImg.src = ""; }, 300); });
        });
    </script>
</body>
</html>
