<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Galleries - Skaldsson</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        /* Base Reset & Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "am-udine", sans-serif;
            font-weight: 400;
            font-style: normal;
            overflow: hidden;
        }

        /* Fade-in transition from the index page */
        body {
            animation: fadeIn 2s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Corner Links Shared Styling */
        .corner-link {
            position: absolute;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            transition: color 0.4s ease, letter-spacing 0.4s ease;
        }

        /* Hover effect: shifts to grey and expands slightly */
        .corner-link:hover {
            color: #888;
            letter-spacing: 5px; 
        }

        /* Exact Corner Positions */
        .top-left {
            top: 40px;
            left: 50px;
        }

        .top-right {
            top: 40px;
            right: 50px;
        }

        .bottom-left {
            bottom: 40px;
            left: 50px;
        }

        .bottom-right {
            bottom: 40px;
            right: 50px;
        }
        
        /* Optional: Faint center anchor mark to balance the negative space */
        .center-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 1px;
            background-color: #222; 
        }
    </style>
</head>
<body>

    <div class="center-mark"></div>

    <a href="fire.html" class="corner-link top-left">fire.</a>
    <a href="haze.html" class="corner-link top-right">haze.</a>
    <a href="green.html" class="corner-link bottom-left">green.</a>
    <a href="animal.html" class="corner-link bottom-right">animal.</a>

</body>
</html>
