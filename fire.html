<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire - Skaldsson</title>
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: #000; color: #fff;
            font-family: "am-udine", sans-serif; font-weight: 400;
            overflow-x: hidden;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Responsive Gallery Layout */
        .gallery-container {
            display: grid; 
            /* Changed min-width to 250px so it doesn't break small phones */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 60px;
            padding: 100px 80px 150px 80px; 
            max-width: 1600px; 
            margin: 0 auto;
        }

        .gallery-item { 
            display: flex; flex-direction: column; 
        }
        
        .gallery-item img {
            width: 100%; height: auto; 
            filter: grayscale(100%) contrast(1.2); 
            transition: filter 0.5s ease, transform 0.4s ease;
            cursor: zoom-in; /* Changes cursor to a magnifying glass */
        }
        
        .gallery-item:hover img { 
            filter: grayscale(0%) contrast(1); 
        }

        /* Full Screen Modal (Lightbox) */
        .modal {
            display: none; 
            position: fixed; z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.95); /* Deep black transparent background */
            opacity: 0; transition: opacity 0.3s ease;
            cursor: zoom-out;
            display: flex; justify-content: center; align-items: center;
            visibility: hidden; /* Hidden by default */
        }

        .modal.show { 
            visibility: visible;
            opacity: 1; 
        }

        .modal-content {
            max-width: 95vw; 
            max-height: 95vh; 
            object-fit: contain; /* Ensures the image is fully visible without stretching */
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Return Button */
        .return-btn {
            position: fixed; bottom: 40px; left: 50px;
            color: #fff; text-decoration: none; font-size: 1.2rem;
            letter-spacing: 2px; z-index: 100; transition: color 0.3s ease;
        }
        
        .return-btn:hover { color: #555; }

        /* --- MOBILE REPAIR --- */
        @media (max-width: 768px) {
            .gallery-container {
                grid-template-columns: 1fr; /* Force single column on phones */
                padding: 60px 20px 120px 20px; /* Reduce extreme padding for mobile */
                gap: 40px;
            }
            .return-btn {
                bottom: 25px; left: 25px; /* Adjust button position for thumbs */
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <a href="horizontal.html" class="return-btn">don't like it</a>

    <div id="image-modal" class="modal">
        <img class="modal-content" id="full-image">
    </div>

    <div class="gallery-container">
        <div class="gallery-item"><img src="Sunset/Sunset-1.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-2.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-3.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-5.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-6.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-7.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-8.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-9.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-10.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-11.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset-12.jpg" alt="Sunset"></div>
        <div class="gallery-item"><img src="Sunset/Sunset.jpg" alt="Sunset"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById("image-modal");
            const modalImg = document.getElementById("full-image");
            const galleryImages = document.querySelectorAll(".gallery-item img");

            // Open modal when an image is clicked
            galleryImages.forEach(img => {
                img.addEventListener("click", () => {
                    modalImg.src = img.src; // Copy the clicked image source to the modal
                    modal.classList.add("show"); // Trigger the CSS fade-in
                });
            });

            // Close modal when clicking anywhere on it
            modal.addEventListener("click", () => {
                modal.classList.remove("show"); // Trigger the CSS fade-out
                
                // Wait for the fade animation to finish before clearing the image source
                setTimeout(() => {
                    if (!modal.classList.contains("show")) {
                        modalImg.src = ""; 
                    }
                }, 300); 
            });
        });
    </script>
</body>
</html>
