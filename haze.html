<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haze - Skaldsson</title>
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: #000; color: #fff;
            font-family: "am-udine", sans-serif; font-weight: 400;
            overflow-x: hidden;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Minimalistic Gallery Layout */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 60px;
            padding: 100px 80px 150px 80px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .gallery-item {
            display: flex; flex-direction: column; align-items: flex-end;
        }

        .gallery-item img {
            width: 100%; height: auto;
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0.5s ease;
        }

        .gallery-item:hover img { filter: grayscale(0%) contrast(1); }

        /* The Elusive Text Link */
        .more-link {
            margin-top: 15px; color: #fff; text-decoration: none;
            font-size: 1.1rem; letter-spacing: 2px; cursor: pointer;
            transition: transform 0.4s ease, opacity 0.4s ease, color 0.4s ease;
        }

        .more-link.ready { color: #aaa; text-decoration: underline; text-underline-offset: 4px; }
        .more-link.ready:hover { color: #fff; }

        /* Return Button */
        .return-btn {
            position: fixed; bottom: 40px; left: 50px;
            color: #fff; text-decoration: none; font-size: 1.2rem;
            letter-spacing: 2px; z-index: 100; transition: color 0.3s ease;
        }
        .return-btn:hover { color: #555; }
    </style>
</head>
<body>

    <a href="horizontal.html" class="return-btn">don't like it</a>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="haze/image1.jpg" alt="Haze Image">
            <a href="#" class="more-link" data-ready="false" data-animating="false">more?</a>
        </div>
        <div class="gallery-item">
            <img src="haze/image2.jpg" alt="Haze Image">
            <a href="#" class="more-link" data-ready="false" data-animating="false">more?</a>
        </div>
        </div>

    <script>
        document.querySelectorAll('.more-link').forEach(link => {
            // Prevent clicking until the 3 repetitions are finished
            link.addEventListener('click', (e) => {
                if (link.dataset.ready !== "true") e.preventDefault();
            });

            link.addEventListener('mouseenter', async (e) => {
                if (link.dataset.animating === "true" || link.dataset.ready === "true") return;
                link.dataset.animating = "true";

                // Sequence happens 3 times
                for (let i = 0; i < 3; i++) {
                    // Move slightly and disappear
                    link.style.transform = "translateX(8px) translateY(-4px)";
                    link.style.opacity = "0";
                    await new Promise(r => setTimeout(r, 350));
                    
                    // Reappear with new text
                    link.textContent = "are you sure?";
                    link.style.transform = "translateX(0) translateY(0)";
                    link.style.opacity = "1";
                    await new Promise(r => setTimeout(r, 600));
                }

                // Make clickable after the 3rd repetition
                link.dataset.ready = "true";
                link.dataset.animating = "false";
                link.classList.add('ready');
                link.href = "detailed-haze-view.html"; // Place your detailed link here
            });
        });
    </script>
</body>
</html>
