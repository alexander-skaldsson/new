<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaldsson Experimental Photography</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        /* Base Reset & Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "am-udine", sans-serif;
            font-weight: 400;
            font-style: normal;
            overflow: hidden;
        }

        /* Pitch Black Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10;
            transition: opacity 2.5s ease-in-out;
        }

        /* Flicker Animation */
        .flicker {
            animation: flicker-effect 0.6s ease-in-out 2;
        }

        @keyframes flicker-effect {
            0% { opacity: 1; }
            25% { opacity: 0.2; }
            50% { opacity: 0.8; }
            75% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        /* 'choose.' Trigger Text */
        #choose-text {
            position: fixed;
            bottom: 40px;
            right: 50px;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0;
            z-index: 11;
            cursor: pointer;
            transition: opacity 1s ease, color 0.3s ease;
        }

        #choose-text:hover {
            color: #888; /* Subtle grey on hover */
        }

        /* Main Content Container */
        #main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 3s ease-in-out;
        }

        /* Giant Skewed Cross */
        .cross-container {
            position: relative;
            /* Takes up 90% of the viewport */
            width: 90vw;
            height: 90vh;
            max-width: 1400px;
            max-height: 1400px;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 2.5s ease 0.5s, transform 2.5s ease 0.5s;
        }

        /* The Lines as Links */
        .line-link {
            display: block;
            position: absolute;
            background-color: #fff;
            border-radius: 50px; /* Makes the edges highly rounded */
            transition: background-color 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        /* Hover effect to show they are distinct, clickable paths */
        .line-link:hover {
            background-color: #888; /* shifts to grey to indicate it's active */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 5; /* Brings hovered line to the front of the intersection */
        }

        /* The vertical-ish line */
        .line-v {
            top: 5%;
            left: 45%;
            width: 12px; /* Thicker */
            height: 90%;
            transform: rotate(14deg); /* Skewed angle */
        }

        .line-v:hover {
            transform: rotate(14deg) scale(1.02);
        }

        /* The horizontal-ish line */
        .line-h {
            top: 48%;
            left: 5%;
            width: 90%;
            height: 12px; /* Thicker */
            transform: rotate(-9deg); /* Skewed angle */
        }

        .line-h:hover {
            transform: rotate(-9deg) scale(1.02);
        }

        /* Contact Info Block */
        #contact-box {
            position: fixed;
            bottom: 40px;
            right: 50px;
            text-align: right;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 2px;
            line-height: 1.8;
            opacity: 0;
            z-index: 10;
            transform: translateY(10px);
            transition: opacity 2s ease 1.5s, transform 2s ease 1.5s; /* Delays appearance until after cross is visible */
            pointer-events: none; /* Initially unclickable */
        }

        #contact-box a {
            color: #fff;
            text-decoration: none;
            transition: color 0.4s ease;
            pointer-events: auto; /* Make the link clickable */
        }

        #contact-box a:hover {
            color: #888;
        }

        /* Revealed State Classes */
        .revealed #overlay {
            opacity: 0;
            pointer-events: none;
        }
        
        .revealed #main-content {
            opacity: 1;
        }

        .revealed .cross-container {
            opacity: 1;
            transform: scale(1);
        }

        .revealed #contact-box {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="choose-text">choose.</div>
