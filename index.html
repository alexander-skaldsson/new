<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaldsson Experimental Photography</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        /* Base Reset & Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "am-udine", sans-serif;
            font-weight: 400;
            font-style: normal;
            overflow: hidden;
        }

        /* Pitch Black Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10;
            transition: opacity 2.5s ease-in-out;
        }

        /* Flicker Animation */
        .flicker {
            animation: flicker-effect 0.6s ease-in-out 2;
        }

        @keyframes flicker-effect {
            0% { opacity: 1; }
            25% { opacity: 0.2; }
            50% { opacity: 0.8; }
            75% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        /* 'choose.' Trigger Text */
        #choose-text {
            position: fixed;
            bottom: 40px;
            right: 50px;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0;
            z-index: 11;
            cursor: pointer;
            transition: opacity 1s ease, color 0.3s ease;
        }

        #choose-text:hover {
            color: #888; /* Subtle grey on hover */
        }

        /* Main Content Container */
        #main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 3s ease-in-out;
        }

        /* Typography */
        h1 {
            color: #fff;
            font-size: clamp(1.2rem, 2vw, 2rem);
            letter-spacing: 4px;
            text-transform: lowercase;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease 1s, transform 2s ease 1s;
            position: absolute;
            top: 10%;
        }

        /* Skewed Cross - Pure CSS */
        .cross-container {
            position: relative;
            width: 300px;
            height: 300px;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 2.5s ease 1.2s, transform 2.5s ease 1.2s;
            margin-bottom: 40px;
        }

        /* The vertical-ish line */
        .line-v {
            position: absolute;
            top: 5%;
            left: 42%;
            width: 2px;
            height: 90%;
            background-color: #fff;
            transform: rotate(14deg); /* Skewed angle */
        }

        /* The horizontal-ish line */
        .line-h {
            position: absolute;
            top: 55%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #fff;
            transform: rotate(-9deg); /* Skewed angle, not perfectly crossed */
        }

        /* The Geometric Bar Links */
        .bar-container {
            display: flex;
            gap: 80px;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease 1.8s, transform 2s ease 1.8s;
            height: 80px; /* Gives a fixed area so scaling doesn't shift layout */
        }

        .bar-link {
            display: block;
            background-color: #fff;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), background-color 0.3s ease;
            cursor: pointer;
        }

        /* Vertical Choice Bar */
        .vertical-bar {
            width: 3px;
            height: 45px;
            transform-origin: center;
        }

        /* Horizontal Choice Bar */
        .horizontal-bar {
            width: 45px;
            height: 3px;
            transform-origin: center;
        }

        /* Hover animations for the bars */
        .bar-link:hover {
            background-color: #aaa;
        }
        
        .vertical-bar:hover {
            transform: scaleY(1.6); /* Stretches taller on hover */
        }

        .horizontal-bar:hover {
            transform: scaleX(1.6); /* Stretches wider on hover */
        }

        /* Revealed State Classes */
        .revealed #overlay {
            opacity: 0;
            pointer-events: none;
        }
        
        .revealed #main-content {
            opacity: 1;
        }

        .revealed h1, 
        .revealed .cross-container, 
        .revealed .bar-container {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="choose-text">choose.</div>

    <div id="main-content">
        <h1>skaldsson experimental photography</h1>
        
        <div class="cross-container">
            <div class="line-v"></div>
            <div class="line-h"></div>
        </div>

        <div class="bar-container">
            <a href="vertical.html" class="bar-link vertical-bar" aria-label="Vertical Gallery"></a>
            
            <a href="horizontal.html" class="bar-link horizontal-bar" aria-label="Horizontal Gallery"></a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById('overlay');
            const chooseText = document.getElementById('choose-text');
            const body = document.body;

            // 1. Initial pause on the pitch black screen (Wait 2 seconds)
            setTimeout(() => {
                
                // 2. Trigger the flicker animation
                overlay.classList.add('flicker');

                // 3. Fade in the word "choose." right after the flicker ends
                setTimeout(() => {
                    chooseText.style.opacity = '1';
                }, 800);

            }, 2000);

            // 4. Reveal the page ONLY when "choose." is clicked
            chooseText.addEventListener('click', () => {
                chooseText.style.opacity = '0';
                // Wait briefly for text to fade before showing the rest
                setTimeout(() => {
                    body.classList.add('revealed');
                    chooseText.style.display = 'none'; // Remove from flow so it can't be clicked again
                }, 500); 
            });
        });
    </script>
</body>
</html>
