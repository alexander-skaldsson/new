<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaldsson Experimental Photography</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/zie3yjb.css">
    
    <style>
        /* Base Reset & Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "am-udine", sans-serif;
            font-weight: 400;
            font-style: normal;
            overflow: hidden;
        }

        /* Pitch Black Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10;
            transition: opacity 2s ease-in-out;
        }

        /* Flicker Animation */
        .flicker {
            animation: flicker-effect 0.6s ease-in-out 2;
        }

        @keyframes flicker-effect {
            0% { opacity: 1; }
            25% { opacity: 0.2; }
            50% { opacity: 0.8; }
            75% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        /* 'Here' Trigger Text */
        #here-text {
            position: fixed;
            bottom: 40px;
            right: 50px;
            color: #d48c48; /* Muted orange matching the sunset */
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0;
            z-index: 11;
            cursor: pointer;
            transition: opacity 1s ease, color 0.3s ease;
        }

        #here-text:hover {
            color: #fff;
        }

        /* Main Content Container */
        #main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Make sure the path matches where your image is saved */
            background-image: url('Sunset/Sunset-12.jpg'); 
            background-size: cover;
            background-position: center bottom;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 2.5s ease-in-out;
        }

        /* Typography & Layout */
        h1 {
            color: #1a1a1a; /* Dark charcoal for contrast against the bright sky */
            font-size: clamp(2rem, 4vw, 3.5rem);
            letter-spacing: 3px;
            text-transform: lowercase;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease 1s, transform 2s ease 1s;
        }

        .btn-container {
            display: flex;
            gap: 40px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease 1.5s, transform 2s ease 1.5s;
        }

        .btn {
            padding: 10px 40px;
            color: #1a1a1a;
            text-decoration: none;
            border: 1px solid rgba(26, 26, 26, 0.4);
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: #1a1a1a;
            color: #e5b078; /* Soft sunset gold on hover */
            border-color: #1a1a1a;
        }

        /* Revealed State Classes */
        .revealed #overlay {
            opacity: 0;
            pointer-events: none;
        }
        
        .revealed #main-content {
            opacity: 1;
        }

        .revealed h1, .revealed .btn-container {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="here-text">here.</div>

    <div id="main-content">
        <h1>skaldsson experimental photography</h1>
        <div class="btn-container">
            <a href="vertical.html" class="btn">vertical</a>
            <a href="horizontal.html" class="btn">horizontal</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById('overlay');
            const hereText = document.getElementById('here-text');
            const body = document.body;

            // 1. Initial pause on the pitch black screen (Wait 2 seconds)
            setTimeout(() => {
                
                // 2. Trigger the flicker animation
                overlay.classList.add('flicker');

                // 3. Fade in the word "here." right after the flicker ends
                setTimeout(() => {
                    hereText.style.opacity = '1';
                }, 800);

            }, 2000);

            // 4. Function to reveal the page
            const revealPage = () => {
                hereText.style.opacity = '0';
                body.classList.add('revealed');
            };

            // 5. Reveal the page automatically after a few seconds of "here." being visible
            const autoReveal = setTimeout(() => {
                revealPage();
            }, 5500);

            // Optional: Allow the user to click "here." to skip the waiting time
            hereText.addEventListener('click', () => {
                clearTimeout(autoReveal);
                revealPage();
            });
        });
    </script>
</body>
</html>
